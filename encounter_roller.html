<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&amp;D 5E Encounter Roller</title>
<style>
  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --accent: #e94560;
    --gold: #f5a623;
    --text: #e0e0e0;
    --subtext: #a0a0b0;
    --green: #4ecca3;
    --border: #2a2a4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Title ── */
  header {
    background: var(--panel);
    text-align: center;
    padding: 18px 0 14px;
    border-bottom: 3px solid var(--accent);
  }
  header h1 {
    font-family: Georgia, serif;
    font-size: 1.7rem;
    color: var(--gold);
    letter-spacing: 1px;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 28px;
    flex-wrap: wrap;
    background: var(--bg);
  }
  .controls label {
    font-size: 1rem;
    color: var(--text);
  }
  select {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 12px;
    font-size: 1rem;
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: var(--accent); }

  button {
    border: none;
    border-radius: 4px;
    padding: 8px 20px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  #btn-roll {
    background: var(--accent);
    color: #fff;
    font-weight: bold;
  }
  #btn-roll:hover { background: #c73652; }
  #btn-reroll {
    background: var(--border);
    color: var(--text);
  }
  #btn-reroll:hover:not(:disabled) { background: #3a3a5a; }
  #btn-reroll:disabled { opacity: 0.45; cursor: default; }

  #roll-badge {
    margin-left: auto;
    font-size: 1.05rem;
    font-weight: bold;
    color: var(--green);
    min-width: 120px;
    text-align: right;
  }

  /* ── Result panels ── */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 16px;
    padding: 0 20px 20px;
    flex: 1;
  }
  @media (max-width: 640px) {
    .panels { grid-template-columns: 1fr; }
  }

  .panel {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-title {
    font-family: Georgia, serif;
    font-size: 1.05rem;
    font-weight: bold;
    color: var(--gold);
    text-align: center;
    padding: 10px 0 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--panel);
  }
  .panel-sep {
    height: 2px;
    background: var(--accent);
  }
  .panel-body {
    padding: 14px 16px;
    flex: 1;
    overflow-y: auto;
    line-height: 1.65;
  }

  .result-name {
    font-family: Georgia, serif;
    font-size: 1.1rem;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .result-row {
    margin-bottom: 4px;
  }
  .result-label {
    color: var(--green);
    font-weight: bold;
    font-size: 0.9rem;
  }
  .result-value {
    color: var(--text);
  }
  .result-magic {
    color: var(--accent);
  }
  .placeholder {
    color: var(--subtext);
    font-style: italic;
  }

  /* dice animation */
  @keyframes pop {
    0%   { transform: scale(1.4); opacity: 0.6; }
    100% { transform: scale(1);   opacity: 1; }
  }
  .popped { animation: pop 0.25s ease-out; }
</style>
</head>
<body>

<header>
  <h1>&#9876;&nbsp; D&amp;D 5E Random Encounter Roller &nbsp;&#9876;</h1>
</header>

<div class="controls">
  <label for="level-select">Party Level:</label>
  <select id="level-select">
    <option value="1">Level 1</option>
    <option value="2">Level 2</option>
    <option value="3">Level 3</option>
    <option value="4">Level 4</option>
    <option value="5">Level 5</option>
    <option value="6">Level 6</option>
    <option value="7">Level 7</option>
    <option value="8">Level 8</option>
    <option value="9">Level 9</option>
  </select>
  <button id="btn-roll">Roll Encounter (d100)</button>
  <button id="btn-reroll" disabled>Re-roll</button>
  <span id="roll-badge"></span>
</div>

<div class="panels">
  <div class="panel" id="enc-panel">
    <div class="panel-title">Encounter</div>
    <div class="panel-sep"></div>
    <div class="panel-body" id="enc-body">
      <p class="placeholder">Choose a party level and roll to begin.</p>
    </div>
  </div>
  <div class="panel" id="tre-panel">
    <div class="panel-title">Treasure</div>
    <div class="panel-sep"></div>
    <div class="panel-body" id="tre-body">
      <p class="placeholder">Treasure will appear here after rolling.</p>
    </div>
  </div>
</div>

function roll100() {
  return Math.floor(Math.random() * 100) + 1;
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function renderEncounter(entry, roll) {
  if (!entry || !entry.name) {
    return `<p class="placeholder">No encounter found for roll ${roll}.</p>`;
  }
  let h = `<div class="result-name">${esc(entry.name)}</div>`;
  const fields = [
    ['Monsters', entry.monsters],
    ['AC',       entry.ac],
    ['HP',       entry.hp],
    ['Attack',   entry.attack],
    ['XP',       entry.xp],
  ];
  for (const [label, val] of fields) {
    if (val) {
      h += `<div class="result-row">
        <span class="result-label">${label}:</span>
        <span class="result-value">&nbsp;${esc(val)}</span>
      </div>`;
    }
  }
  return h;
}

function renderTreasure(entry, roll) {
  if (!entry || !entry.name) {
    return `<p class="placeholder">No treasure found for roll ${roll}.</p>`;
  }
  let h = `<div class="result-name">${esc(entry.name)}</div>`;
  if (entry.contents) {
    h += `<div class="result-row">
      <span class="result-label">Contents:</span>
      <span class="result-value">&nbsp;${esc(entry.contents)}</span>
    </div>`;
  }
  if (entry.magic) {
    // Strip markdown bold/italic markers for display
    const cleanMagic = entry.magic.replace(/\*+/g, '');
    h += `<div class="result-row" style="margin-top:8px">
      <span class="result-label">Magic Item:</span>
      <span class="result-magic">&nbsp;${esc(cleanMagic)}</span>
    </div>`;
  }
  if (entry.value) {
    h += `<div class="result-row" style="margin-top:8px">
      <span class="result-label">Total Value:</span>
      <span class="result-value">&nbsp;${esc(entry.value)}</span>
    </div>`;
  }
  return h;
}

function doRoll() {
  const level = parseInt(document.getElementById('level-select').value, 10);
  const r = roll100();

  const badge = document.getElementById('roll-badge');
  badge.textContent = `Rolled: ${String(r).padStart(2,'0')}`;
  badge.classList.remove('popped');
  void badge.offsetWidth; // reflow
  badge.classList.add('popped');

  const levelData = DATA[level];
  const enc = levelData.encounters[r - 1];
  const tre = levelData.treasure[r - 1];

  document.getElementById('enc-body').innerHTML = renderEncounter(enc, r);
  document.getElementById('tre-body').innerHTML = renderTreasure(tre, r);

  document.getElementById('btn-reroll').disabled = false;
}

document.getElementById('btn-roll').addEventListener('click', doRoll);
document.getElementById('btn-reroll').addEventListener('click', doRoll);

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    doRoll();
  }
});
